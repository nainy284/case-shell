<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Shell - Premium Silicone iPhone Cases</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
    header { background:#000; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; }
    nav a { color:#fff; margin:0 10px; text-decoration:none; }
    .hero { text-align:center; padding:50px; background:#eee; }
    .hero h2 { margin-bottom:20px; }
    .hero button { background:#FFD700; border:none; padding:12px 25px; cursor:pointer; font-size:16px; }
    .products { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }
    .product-card { background:#fff; border:1px solid #ddd; border-radius:8px; width:300px; text-align:center; padding:15px; }
    .product-card img { width:100%; height:auto; border-radius:6px; }
    select, button { margin-top:10px; padding:8px; width:90%; }
    #cart, #checkout { background:#fff; padding:20px; margin:20px; border:1px solid #ddd; border-radius:8px; }
    footer { background:#000; color:#fff; text-align:center; padding:20px; margin-top:30px; }
    input, textarea { width:95%; padding:8px; margin:5px 0; }
  </style>
  <script>
    let cart = [];
    function addToCart(modelId) {
      const variant = document.getElementById("variant"+modelId).value;
      const color = document.getElementById("color"+modelId).value;
      const payment = document.getElementById("payment"+modelId).value;
      const item = "iPhone " + modelId + " " + variant + " - " + color + " (" + payment + ")";
      cart.push(item);
      displayCart();
    }
    function displayCart() {
      document.getElementById("cart-items").innerHTML = cart.map(i => "<li>"+i+"</li>").join("");
    }
    function checkout() {
      const name = document.getElementById("cust-name").value;
      const email = document.getElementById("cust-email").value;
      const phone = document.getElementById("cust-phone").value;
      const address = document.getElementById("cust-address").value;
      alert("Order placed!\nName: "+name+"\nEmail: "+email+"\nPhone: "+phone+"\nAddress: "+address+"\nItems: "+cart.join(", "));
    }
  </script>
</head>
<body>

<header>
  <h1>Case Shell</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#cart">Cart</a>
    <a href="#checkout">Checkout</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Premium Silicone Cases for iPhone 12–17</h2>
  <button onclick="document.querySelector('.products').scrollIntoView({behavior:'smooth'})">Shop Now</button>
</section>

<section class="products" id="products">
  <!-- Example Product: iPhone 12 -->
  <div class="product-card">
    <img src="iphone12.jpg" alt="iPhone 12 Silicone Case">
    <h3>iPhone 12 Series</h3>
    <p>Starting from PKR 999</p>
    <select id="variant12">
      <option>iPhone 12</option><option>iPhone 12 Pro</option><option>iPhone 12 Pro Max</option>
    </select>
    <select id="color12">
      <option>Black</option><option>Blue</option><option>Pink</option><option>White</option><option>Green</option>
    </select>
    <select id="payment12">
      <option>Cash on Delivery</option><option>Online Payment</option>
    </select>
    <button onclick="addToCart(12)">Add to Cart</button>
  </div>

  <!-- Repeat same block for iPhone 13–17 -->
</section>

<section id="cart">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
</section>

<section id="checkout">
  <h2>Checkout</h2>
  <form onsubmit="checkout(); return false;">
    <input type="text" id="cust-name" placeholder="Full Name" required>
    <input type="email" id="cust-email" placeholder="Email" required>
    <input type="tel" id="cust-phone" placeholder="Phone Number" required>
    <textarea id="cust-address" placeholder="Delivery Address" required></textarea>
    <button type="submit">Place Order</button>
  </form>
</section>

<footer id="contact">
  <p>© 2026 Case Shell | Email: <a href="mailto:naink2148@gmail.com">naink2148@gmail.com</a> | Phone: <a href="tel:03239028622">03239028622</a></p>
</footer>

</body>
</html>
