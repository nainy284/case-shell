<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Case Shell - Complete Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
  background:#000;color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header input{padding:8px;width:200px}

/* PRODUCTS */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}

.card{
  background:#fff;
  width:250px;
  margin:10px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px #ccc;
  transition:0.2s;
}
.card:hover{transform:scale(1.03)}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CART */
#cart{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#fff;
  padding:10px;
  overflow:auto;
  box-shadow:-2px 0 10px #aaa;
}

button{
  width:100%;
  padding:8px;
  margin-top:5px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* ADMIN */
#admin{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#fff;
  padding:20px;
  overflow:auto;
}

input,textarea,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}

@media(max-width:768px){
  .card{width:90%}
  #cart{width:100%;position:relative}
}
</style>
</head>

<body>

<header>
  <div>📱 Case Shell Store</div>
  <div>
    <input id="search" onkeyup="render()" placeholder="Search iPhone...">
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</header>

<div class="container" id="products"></div>

<!-- CART -->
<div id="cart">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
  <h4 id="total"></h4>

  <h3>Checkout</h3>
  <input id="custName" placeholder="Name">
  <input id="custPhone" placeholder="Phone">
  <input id="custAddress" placeholder="Address">
  <input id="custCity" placeholder="City">

  <select id="custPayment">
    <option>Cash on Delivery</option>
    <option>Credit/Debit Card</option>
    <option>JazzCash</option>
    <option>Easypaisa</option>
  </select>

  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- ADMIN -->
<div id="admin">
  <h2>Admin Panel</h2>
  <button onclick="toggleAdmin()">Close</button>

  <h3>Add Product</h3>
  <input id="pname" placeholder="Product Name">
  <input id="pcat" placeholder="Category (iPhone 12 etc)">
  <textarea id="pvariants" placeholder='[
{"model":"iPhone 12 Black","price":999,"image":"img.jpg"}
]'></textarea>

  <button onclick="addProduct()">Add Product</button>

  <h3>Products</h3>
  <div id="adminList"></div>
</div>

<script>

/* LOAD PRODUCTS */
let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"iPhone Case",category:"iPhone 12",variants:[
    {model:"12 Black",price:999,image:"iphone12-black.jpg"},
    {model:"12 Blue",price:999,image:"iphone12-blue.jpg"},
    {model:"12 Pink",price:999,image:"iphone12-pink.jpg"}
  ]},
  {name:"iPhone Case",category:"iPhone 13",variants:[
    {model:"13 Black",price:999,image:"iphone13-black.jpg"},
    {model:"13 Blue",price:999,image:"iphone13-blue.jpg"}
  ]},
  {name:"iPhone Case",category:"iPhone 14",variants:[
    {model:"14 Black",price:999,image:"iphone14-black.jpg"}
  ]},
  {name:"iPhone Case",category:"iPhone 15",variants:[
    {model:"15 Black",price:999,image:"iphone15-black.jpg"}
  ]},
  {name:"iPhone Case",category:"iPhone 16",variants:[
    {model:"16 Black",price:999,image:"iphone16-black.jpg"}
  ]},
  {name:"iPhone Case",category:"iPhone 17",variants:[
    {model:"17 Black",price:999,image:"iphone17-black.jpg"}
  ]}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
  localStorage.setItem("products",JSON.stringify(products));
  localStorage.setItem("cart",JSON.stringify(cart));
}

/* RENDER PRODUCTS */
function render(){
  let s=document.getElementById("search").value?.toLowerCase()||"";
  let html="";

  products.forEach((p,i)=>{
    if(p.category.toLowerCase().includes(s)){
      html+=`
      <div class="card">
        <h3>${p.category}</h3>
        <img id="img${i}" src="${p.variants[0].image}">
        
        <select onchange="change(${i},this.value)">
          ${p.variants.map((v,ix)=>
            `<option value="${ix}">${v.model}</option>`
          ).join("")}
        </select>

        <p id="price${i}">PKR ${p.variants[0].price}</p>

        <button onclick="add(${i})">Add to Cart</button>
      </div>`;
    }
  });

  document.getElementById("products").innerHTML=html;
  renderCart();
  renderAdmin();
}

/* VARIANT CHANGE */
function change(i,v){
  let p=products[i].variants[v];
  document.getElementById("img"+i).src=p.image;
  document.getElementById("price"+i).innerText="PKR "+p.price;
}

/* ADD TO CART */
function add(i){
  let sel=document.querySelectorAll("select")[i];
  let v=products[i].variants[sel.value];
  cart.push(v);
  save();
  renderCart();
}

/* CART */
function renderCart(){
  let html="";
  let total=0;

  cart.forEach(c=>{
    total+=c.price;
    html+=`
      <div>
        <img src="${c.image}" width="40">
        ${c.model} - PKR ${c.price}
      </div>`;
  });

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText="Total: PKR "+total;
}

/* ORDER */
function placeOrder(){
  if(cart.length===0) return alert("Cart empty!");

  let name=document.getElementById("custName").value;
  let phone=document.getElementById("custPhone").value;
  let address=document.getElementById("custAddress").value;
  let city=document.getElementById("custCity").value;
  let payment=document.getElementById("custPayment").value;

  alert(
    "ORDER PLACED!\n\n"+
    "Name: "+name+"\n"+
    "Phone: "+phone+"\n"+
    "Address: "+address+", "+city+"\n"+
    "Payment: "+payment+"\n"+
    "Items: "+cart.map(c=>c.model).join(", ")
  );

  cart=[];
  save();
  renderCart();
}

/* ADMIN */
function toggleAdmin(){
  let a=document.getElementById("admin");
  a.style.display = a.style.display==="block"?"none":"block";
}

function addProduct(){
  let name=document.getElementById("pname").value;
  let cat=document.getElementById("pcat").value;
  let variants=JSON.parse(document.getElementById("pvariants").value);

  products.push({name,category:cat,variants});
  save();
  render();
}

function renderAdmin(){
  let html="";
  products.forEach((p,i)=>{
    html+=`<p>${p.category} <button onclick="del(${i})">Delete</button></p>`;
  });
  document.getElementById("adminList").innerHTML=html;
}

function del(i){
  products.splice(i,1);
  save();
  render();
}

render();

</script>

</body>
</html>
